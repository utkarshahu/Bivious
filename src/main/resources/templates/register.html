<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">

<head>
    <title>Signup</title>
</head>

<body class="bg-gray-100 dark:bg-neutral-900">

<div id="content">
    <div class="min-h-screen flex items-center justify-center px-4">

        <div class="w-full max-w-md">

            <!-- Card -->
            <div class="p-8 rounded-2xl shadow-xl 
                        bg-white/80 backdrop-blur-md 
                        dark:bg-neutral-800/80 
                        border border-gray-200 dark:border-gray-700">

            <!-- messagebox -->
             <div th:replace="~{message :: messagebox}"></div>

                <!-- Heading -->
                <h2 class="text-3xl  font-bold text-center text-gray-900 dark:text-white">
                    Create Account
                </h2>

                <p class="text-center text-gray-500 text-sm mt-2 mb-6">
                    Join and start managing your contacts smartly
                </p>

                <!-- Form -->
                <form th:action="@{/do-register}" method="post" th:object="${userForm}" class="space-y-5">

                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                            Full Name
                        </label>
                        <input type="text" th:field="*{name}"
                               placeholder="John Doe"
                               class="w-full px-4 py-2 rounded-lg border 
                                      border-gray-300 dark:border-gray-600
                                      bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 focus:outline-none
                                      transition duration-200" required>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                            Email Address
                        </label>
                        <input type="email" th:field="*{email}"
                               placeholder="example@mail.com"
                               class="w-full px-4 py-2 rounded-lg border 
                                      border-gray-300 dark:border-gray-600
                                      bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 focus:outline-none
                                      transition duration-200" required>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                            Password
                        </label>
                        <input type="password" th:field="*{password}"
                               placeholder="••••••••"
                               class="w-full px-4 py-2 rounded-lg border 
                                      border-gray-300 dark:border-gray-600
                                      bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 focus:outline-none
                                      transition duration-200" required>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                            Phone Number
                        </label>
                        <input type="text" th:field="*{phoneNumber}"
                               placeholder="9876543210"
                               class="w-full px-4 py-2 rounded-lg border 
                                      border-gray-300 dark:border-gray-600
                                      bg-gray-50 dark:bg-gray-700
                                      text-gray-900 dark:text-white
                                      focus:ring-2 focus:ring-blue-500 focus:outline-none
                                      transition duration-200" required>
                    </div>

                    <!-- About -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                            About You
                        </label>
                        <textarea th:field="*{about}" rows="3"
                                  placeholder="Tell us something about yourself..."
                                  class="w-full px-4 py-2 rounded-lg border 
                                         border-gray-300 dark:border-gray-600
                                         bg-gray-50 dark:bg-gray-700
                                         text-gray-900 dark:text-white
                                         focus:ring-2 focus:ring-blue-500 focus:outline-none
                                         transition duration-200"></textarea>
                    </div>

                   

                    <!-- Buttons -->
                    <div class="flex gap-3 pt-2">

                        <button type="submit"
                                class="w-full py-2 rounded-lg text-white font-medium
                                       bg-gradient-to-r from-blue-600 to-indigo-600
                                       hover:from-blue-700 hover:to-indigo-700
                                       transition duration-300 shadow-md">
                            Sign Up
                        </button>

                        <button type="reset"
                                class="w-full py-2 rounded-lg text-white font-medium
                                       bg-gray-500 hover:bg-gray-600
                                       transition duration-300 shadow-md">
                            Reset
                        </button>

                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
    console.log("Signup page UI upgraded");
</script>

</body>
</html>
